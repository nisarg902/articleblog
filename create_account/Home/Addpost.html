<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Post</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <style>
    body {
      background-color: #f8f9fa;
    }
    form {
      max-width: 600px;
      margin: auto;
      margin-top: 50px;
      background-color: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>
  <form onsubmit="handlePost(event)">
    <h3 class="mb-4 text-center">📝 Create a New Article</h3>

    <div class="mb-3">
      <input id="title" class="form-control" placeholder="Title" required>
    </div>

    <div class="mb-3">
      <input id="imgUrl" class="form-control" placeholder="Image URL (optional)">
    </div>

    <div class="mb-3">
      <textarea id="content" class="form-control" placeholder="Content" rows="5" required></textarea>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-upload"></i> Post Article
      </button>
    </div>
  </form>

  <script>
    function handlePost(event) {
      event.preventDefault();

      const title = document.getElementById('title').value.trim();
      const imgUrl = document.getElementById('imgUrl').value.trim();
      const content = document.getElementById('content').value.trim();

      if (!title || !content) {
        alert("Please fill in both the title and content.");
        return;
      }

      const newArticle = {
        id: Date.now(),
        title,
        imgUrl,
        content,
        time: new Date().toLocaleString()
      };

      try {
        const articles = JSON.parse(localStorage.getItem("articles")) || [];
        articles.unshift(newArticle); // Add newest to top
        localStorage.setItem("articles", JSON.stringify(articles));
        window.location.href = "Home.html"; // Redirect
      } catch (e) {
        alert("Failed to save the article. Try again.");
        console.error(e);
      }
    }
  </script>

  <!-- Bootstrap JS (optional if you use Bootstrap components later) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
